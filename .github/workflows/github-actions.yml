# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path
# https://github.com/graalvm/setup-graalvm
# https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax

name: Spring Boot Maven Package

on:
  release:
    types: [published] # 当 Release 从草稿变为正式发布，或直接创建正式发布时触发
  workflow_dispatch:     # 允许在 Actions 页面手动触发（用于调试）

jobs:
  # ---------- War 构建 ----------
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许创建 Release 和上传附件（后续可上传更新包）

    steps:
      # 1. 检出代码（此时会自动切换到 Release 对应的 tag 提交）
      - name: Checkout
        uses: actions/checkout@v7

      # 2. 设置 JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: maven   # 自动缓存 Maven 依赖

      # 3. Maven 构建打包（如需运行测试请删除 -DskipTests）
      - name: Build Production Jar
        run: mvn clean package -DskipTests

      # 4. 将 JAR 包上传到当前的 Release 附件中
      - name: Upload asset to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: target/tycode.war
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------- Linux Native 构建 ----------
  build-linux-native:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up GraalVM JDK
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'liberica'
          cache: maven

      - name: Build Native Image and JAR (Linux)
        run: mvn clean -Pnative native:compile

      - name: Rename Linux binary with _x64_linux suffix
        id: artifacts
        run: |
          # JAR 保持原名，不重命名
          JAR_FILE=$(find target -maxdepth 1 -name "*.jar" | head -1)
          # 可执行文件（无后缀）重命名为 _x64_linux
          EXE_ORIG=$(find target -maxdepth 1 -type f -executable ! -name "*.jar" | head -1)
          EXE_BASE=$(basename "$EXE_ORIG")
          EXE_NEW="target/${EXE_BASE}_x64_linux"
          mv "$EXE_ORIG" "$EXE_NEW"
          echo "jar_file=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "exe_file=$EXE_NEW" >> $GITHUB_OUTPUT
          
      - name: Upload Linux artifacts to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ steps.artifacts.outputs.jar_file }}
            ${{ steps.artifacts.outputs.exe_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------- Windows Native 构建 ----------
  build-Windows-native:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up GraalVM JDK
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'liberica'
          cache: maven

      - name: Setup MSVC development environment (x64) # 加载 Visual Studio 2022 的 x64 开发环境
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build Native Image (Windows)
        run: mvn clean -Pnative native:compile

      - name: Rename Windows .exe with _x64_windows suffix
        id: artifacts
        shell: pwsh
        run: |
          $exe_orig = Get-ChildItem -Path target -Filter "*.exe" | Select-Object -First 1
          $exe_base = $exe_orig.BaseName
          $exe_new_name = "${exe_base}_x64_windows.exe"
          Rename-Item -Path $exe_orig.FullName -NewName $exe_new_name
          $exe_new = Get-ChildItem -Path $exe_orig.Directory -Filter $exe_new_name | Select-Object -First 1
          
          if (-not $exe_new) {
            Write-Error "Renamed file not found"
            exit 1
          }
          $exe_path = $exe_new.FullName -replace '\\', '/'
          echo "exe_file=$exe_path" >> $env:GITHUB_OUTPUT
          Write-Host "exe_file path: $exe_path"

      - name: Upload Windows .exe to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.artifacts.outputs.exe_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
